biography:
  hero:
    title: Biografía Personal
    quote: "¡Mucho gusto 😉! Soy Nicolás, y en esta página conocerás un poco de mi historia (escrita por mí), lo que te dará algunas ideas sobre quién soy."
    image: close_pic
  sections:
    - title: Primeros Años
      image: placa_jarc
      paragraphs:
        - Nacido en Venezuela en 2001, mi viaje comenzó con la curiosidad de cómo se construían los mundos virtuales. Desde mis primeros videojuegos hasta mi primer línea de código, siempre me ha impulsado la necesidad de entender el 'por qué' detrás de la tecnología que usamos todos los días.
        - "A pesar de no ser un 'genio natural', descubrí temprano que la disciplina y el autoaprendizaje eran mucho más poderosos. Esta mentalidad me permitió sobresalir académicamente, eventualmente graduándome con honores y una profunda pasión por las ciencias de la computación."
    - title: El Camino a la Ingeniería
      image: indra_pic
      image_first: true
      paragraphs:
        - Mi camino profesional se cristalizó en la Universidad Tecnológica de Panamá. Mientras estudiaba, asumí el desafío de enseñar, un giro que me enseñó más sobre comunicación y paciencia de lo que cualquier código podría hacerlo.
        - El momento definitivo del inicio de mi carrera fue unirme a Indra. Fue aquí donde pasé de ser un estudiante de código a un profesional de la ingeniería, trabajando en sistemas de nivel empresarial y navegando por las complejidades de la entrega de software moderno.
    - title: Presente y Futuro
      image: recent_pic
      paragraphs:
        - Hoy en día, trabajo como consultor para empresas basadas en EE. UU., operando en la intersección del desarrollo full-stack y la arquitectura en la nube. La transición a trabajar completamente en inglés fue un obstáculo, pero que ha abierto un panorama global de oportunidades.
        - "Mi enfoque sigue siendo constante: construir cosas que importen, aprender todos los días y seguir siendo tan curioso como siempre."

