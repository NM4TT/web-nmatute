biography:
  hero:
    title: Personal Biography
    quote: "Nice to meet you 😉! I'm Nicolás, and on this page, you'll get to know a bit of my story (written by me), which will give you some insights into who I am."
    image: close_pic
  sections:
    - title: Early Life
      image: placa_jarc
      paragraphs:
        - Born in Venezuela in 2001, my journey began with a curiosity for how virtual worlds were built. From my first video games to my first lines of code, I've always been driven by the need to understand the 'why' behind the technology we use every day.
        - "Despite not being a 'natural genius,' I discovered early on that discipline and self-learning were far more powerful. This mindset allowed me to excel academically, eventually graduating with honors and a deep-seated passion for computer science."
    - title: The Path to Engineering
      image: indra_pic
      image_first: true
      paragraphs:
        - My professional path crystallized at the Universidad Tecnológica de Panamá. While studying, I took on the challenge of teaching—a pivot that taught me more about communication and patience than any code ever could.
        - The defining moment of my early career was joining Indra. It was here that I transitioned from a student of code to a practitioner of engineering, working on enterprise-grade systems and navigating the complexities of modern software delivery.
    - title: Present & Future
      image: recent_pic
      paragraphs:
        - Today, I work as a consultant for U.S.-based firms, operating at the intersection of full-stack development and cloud architecture. The transition to working entirely in English was a hurdle, but one that has opened a global landscape of opportunities.
        - My focus remains constant: building things that matter, learning every day, and maintaining the same curiosity that started it all in 2001.
